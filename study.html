<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study – Integros Flashcards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicon.png">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">

    <!-- Header + navigation -->
    <header class="brand-header">
      <div class="brand-logo-wrap">
        <img src="assets/integros-logo.png" alt="Integros logo" class="brand-logo">
      </div>
      <div class="brand-text">
        <h1>Study</h1>
      </div>
      <nav class="brand-nav">
        <a href="index.html">Home</a>
        <a href="study.html" aria-current="page">Study</a>
        <a href="explore.html">Explore</a>
        <a href="about.html">About</a>
      </nav>
    </header>

    <main class="page-main study-main">
      <section class="page-section">

        <!-- Controls: deck picker, mode, score, reset, flagged filter -->
        <div class="controls-row">
          <div class="control-group">
            <label for="deckSelect">
              <svg class="control-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M4 6v2h16V6H4zm0 5v2h16v-2H4zm0 5v2h10v-2H4z"/></svg>
              Deck
            </label>
            <select id="deckSelect" aria-label="Select deck"></select>
          </div>
          <div class="control-group">
            <label for="modeSelect">
              <svg class="control-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.29 14.71L12 14l-4.29 2.71 1.29-4.29-3.29-2.42 4.33-.04L12 6l1.96 4.29 4.33.04-3.29 2.42 1.29 4.29z"/></svg>
              Mode
            </label>
            <select id="modeSelect" aria-label="Select mode">
              <option value="normal">Normal</option>
              <option value="mc">Multiple choice</option>
            </select>
          </div>
          <div class="control-group">
            <label>&nbsp;</label>
            <span id="scoreText">0 right / 0 total</span>
          </div>
          <div class="control-group">
            <label>&nbsp;</label>
            <button id="resetBtn" class="btn-pill" aria-label="Reset progress">Reset progress</button>
          </div>
          <div class="control-group">
            <label>&nbsp;</label>
            <button id="flaggedOnlyBtn" class="btn-pill" aria-label="Show flagged cards only" aria-pressed="false">⚑ Flagged only</button>
          </div>
        </div>

        <!-- Progress bar: purple = position, green = correct -->
        <div class="progress-wrap" aria-label="Deck progress">
          <div class="progress-track">
            <div id="progressBar" class="progress-bar"></div>
            <div id="progressCorrect" class="progress-correct"></div>
          </div>
          <span id="progressLabel" class="progress-label">0 / 0</span>
        </div>

        <!-- Flashcard -->
        <div id="card" class="card">
          <div class="card-header">
            <span id="cardLabel" class="card-label">Question</span>
            <button id="flagBtn" class="flag-btn" aria-label="Flag this card" title="Flag for review (keyboard: F)">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                <path d="M14.4 6L14 4H5v17h2v-7h5.6l.4 2h7V6z"/>
              </svg>
            </button>
          </div>
          <div id="cardText" class="card-text">
            Loading...
          </div>
        </div>

        <!-- Card counter -->
        <div class="card-counter">
          <span id="cardIndex">1</span> / <span id="cardTotal">1</span>
        </div>

        <!-- Navigation: prev / flip / next -->
        <div class="card-actions">
          <button id="prevBtn" class="btn-pill" aria-label="Previous card">Prev</button>
          <button id="flipBtn" class="btn-pill" aria-label="Flip card">Flip</button>
          <button id="nextBtn" class="btn-pill" aria-label="Next card">Next</button>
        </div>

        <!-- Multiple choice options (hidden in normal mode) -->
        <div id="mcRow" class="mc-row">
          <button class="btn-pill mc-option" data-index="0" aria-label="Option 1"></button>
          <button class="btn-pill mc-option" data-index="1" aria-label="Option 2"></button>
          <button class="btn-pill mc-option" data-index="2" aria-label="Option 3"></button>
          <button class="btn-pill mc-option" data-index="3" aria-label="Option 4"></button>
        </div>

      </section>
    </main>

    <!-- Footer -->
    <footer class="app-footer">
      <p>Integros Flashcards · Train your knowledge. Master your craft.</p>
    </footer>
  </div>

  <!-- Core engine (Integros API) -->
  <script src="app.js"></script>
  <!-- Toast notifications -->
  <script src="toast.js"></script>
  <!-- Study page logic -->
  <script src="study.js"></script>
</body>
</html>
